{% load static %}
<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión Docente - ULEAM{% endblock %}</title>
    <link href="{% static 'core/vendor/bootstrap/bootstrap.min.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/vendor/fontawesome/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'core/vendor/bootstrap-icons/bootstrap-icons.min.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}?v=azul-ui-20260722">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    <script src="{% static 'core/vendor/bootstrap/bootstrap.bundle.min.js' %}"></script>
    <script>
    (function(){
        const root = document.documentElement;
        const savedSize = localStorage.getItem('access-font-size') || '1';
        const savedFont = localStorage.getItem('access-font-family') || "'Segoe UI', system-ui, -apple-system, sans-serif";
        root.style.setProperty('--access-font-size', savedSize);
        root.style.setProperty('--access-font-family', savedFont);
    })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
