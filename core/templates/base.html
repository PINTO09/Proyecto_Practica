{% load static %}
<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión Docente - ULEAM{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}?v=plomo-menu-20260703">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    (function(){
        const root = document.documentElement;
        const savedSize = localStorage.getItem('access-font-size') || '1';
        const savedFont = localStorage.getItem('access-font-family') || "'Segoe UI', system-ui, -apple-system, sans-serif";
        root.style.setProperty('--access-font-size', savedSize);
        root.style.setProperty('--access-font-family', savedFont);
    })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
